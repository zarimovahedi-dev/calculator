<script>
    let inp = document.querySelector('input')
    let num1 = ''
    let num2 = ''
    let op = ''
    function myCalc(btn) {
        let num = btn.innerText
        inp.value += num
        // console.log(num);
    }
    function eql() {
        num2 = Number(inp.value)
        let result
        if (op == '+') {
            result = num1 + num2
        }
        if (op == '-') {
            result = num1 - num2
        }
        if (op == '*') {
            result = num1 * num2
        }
        if (op == '/') {
            result = num1 / num2
        }
        inp.value = result
    }
    function myOp(o) {
        num1 = Number(inp.value)
        op = o.innerText
        inp.value = ''
    }
    function clean() {
        inp.value = ''
        num1 = ''
        num2 = ''
        op = ''
    }
</script>
